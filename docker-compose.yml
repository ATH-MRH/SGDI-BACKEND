services:
  sgdi:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: INFO
      API_PREFIX: /api
      ALLOW_PUBLIC_REGISTRATION: "false"
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:?}:${POSTGRES_PASSWORD:?}@postgres:5432/${POSTGRES_DB:?}
      JWT_SECRET: ${JWT_SECRET:?}
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: "720"
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME:-}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-}
      ADMIN_SYSTEM_USERNAME: ${ADMIN_SYSTEM_USERNAME:-}
      ADMIN_SYSTEM_PASSWORD: ${ADMIN_SYSTEM_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?}
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - sgdi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  sgdi_postgres_data:
